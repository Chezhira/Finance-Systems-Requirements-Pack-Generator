key: inventory_costing
name: Inventory Costing
purpose: Improve inventory valuation, cost variance review, subledger-to-GL reconciliation, landed cost allocation, and stock adjustment controls.
pain_point_prompts:
  - Inventory valuation differences
  - Cost variance review gaps
  - Manual landed cost allocation
  - Unapproved stock adjustments
baseline_scope:
  - Inventory valuation, cost updates, landed cost allocation, variance review, stock adjustments, and GL reconciliation.
  - Visibility of standard cost, actual cost, purchase price variance, production variance, and inventory ageing.
  - Controls over costing method changes, manual adjustments, and reconciliation sign-off.
functional_requirements:
  - Capture SKU, warehouse, quantity, unit cost, valuation method, cost version, and inventory value.
  - Reconcile inventory subledger balances to GL inventory control accounts by period and location.
  - Track standard cost updates with effective date, reason, requester, reviewer, and approval status.
  - Allocate landed costs using approved allocation basis and link charges to receipt or shipment references.
  - Identify purchase price variance, production variance, and manual cost adjustments by materiality threshold.
  - Route stock adjustments and write-downs for approval before posting.
  - Produce inventory valuation reports by SKU, warehouse, ageing bucket, cost method, and variance category.
  - Preserve costing assumptions and supporting evidence for finance review.
non_functional_requirements:
  - Costing reports must be understandable to finance, operations, and inventory control users.
  - The workflow must support period-end valuation review without offline spreadsheet rebuilds.
  - Access must separate cost maintenance, stock adjustment entry, adjustment approval, and GL posting.
  - Valuation evidence must be retained for audit and management review.
  - The design must support location-level reporting without mixing warehouse responsibilities.
data_requirements:
  - SKU/item ID
  - Warehouse/location
  - Quantity on hand
  - Unit cost
  - Valuation method
  - Landed cost reference
  - Inventory control account
  - Cost variance reason code
controls:
  - Standard cost changes require approval before effective date.
  - Stock adjustments and write-downs require reason codes and reviewer sign-off.
  - Inventory subledger-to-GL differences over threshold require owner assignment.
  - Landed cost allocation basis must be approved and retained.
  - Costing method changes require finance controller approval.
audit_trail_requirements:
  - Store cost version changes with old value, new value, requester, approver, and effective date.
  - Record stock adjustment creation, approval, posting, and reversal history.
  - Preserve landed cost allocation inputs, basis, reviewer, and timestamp.
  - Track subledger-to-GL reconciliation owner/status history.
  - Keep valuation report export and sign-off evidence by period.
user_stories:
  - As a cost accountant, I want cost variance exceptions by SKU so that material valuation issues are reviewed.
  - As a finance manager, I want inventory subledger-to-GL reconciliation so that balance sheet inventory is supported.
  - As an operations manager, I want stock adjustments routed for approval so that shrinkage and corrections are controlled.
  - As a controller, I want standard cost change history so that margin movements can be explained.
  - As an auditor, I want landed cost allocation evidence so that inventory valuation assumptions are traceable.
uat_test_cases:
  - scenario: Standard cost is changed for a material SKU.
    expected: Old value, new value, reason, requester, approver, and effective date are recorded.
  - scenario: Inventory subledger does not match the GL control account.
    expected: A reconciliation difference is created with owner, amount, and reason fields.
  - scenario: Landed cost allocation is posted.
    expected: Allocation basis, source charge, receipt reference, and reviewer evidence are stored.
  - scenario: Stock adjustment exceeds approval threshold.
    expected: Posting is blocked until reviewer sign-off is captured.
  - scenario: Cost variance exceeds materiality threshold.
    expected: The variance appears in the costing exception report with owner and category.
  - scenario: Inventory valuation pack is exported.
    expected: The pack includes valuation, variances, adjustments, landed costs, and GL reconciliation status.
acceptance_criteria:
  - Inventory valuation reports show SKU, location, quantity, unit cost, value, and cost method.
  - Standard cost changes and costing method changes are approved and auditable.
  - Stock adjustments cannot post without reason code and approval where required.
  - Subledger-to-GL differences are owner-assigned and visible by period.
  - Landed cost allocation evidence is retained with basis and reviewer sign-off.
risks_and_dependencies:
  - Item master data and warehouse locations may need cleanup before reliable valuation reporting.
  - Approved costing method and standard cost policy must be confirmed.
  - Landed cost source data may depend on procurement and logistics integration.
  - Historic stock adjustments may require review before migration.
  - Operations and finance ownership of variance resolution must be agreed.
implementation_readiness:
  process_checks:
    - check: Confirm costing method, valuation rules, landed-cost allocation, and adjustment approvals are signed off.
      evidence: Approved costing policy mapped to system configuration decisions.
      owner_role: Inventory Accounting Lead
      source_references: [FR-01, FR-03, FR-05, CTRL-02]
    - check: Confirm inventory subledger-to-GL differences have owners, reason categories, and period-end sign-off.
      evidence: Approved reconciliation workflow and exception reporting design.
      owner_role: Inventory Controller
      source_references: [FR-06, CTRL-04, AUD-04]
  configuration_workshop_questions:
    - question: Which costing method applies by item, category, location, and legal entity?
      relevance: Defines valuation configuration and prevents inconsistent costing treatment.
      source_references: [FR-01, DR-04, UAT-01]
    - question: Which landed-cost components and allocation bases apply to each inventory flow?
      relevance: Establishes repeatable freight, duty, and handling allocation.
      source_references: [FR-03, DR-07, UAT-03]
    - question: Which stock adjustments and variances require approval or finance investigation?
      relevance: Defines materiality, ownership, and evidence for inventory exceptions.
      source_references: [FR-05, CTRL-03, UAT-04]
  cutover_considerations:
    - check: Cleanse item masters, units, warehouse locations, and costing attributes before migration.
      evidence: Signed item and location data-quality results.
      owner_role: Inventory Master Data Owner
      source_references: [DR-01, DR-02, RISK-01]
    - check: Reconcile migrated quantities and values to the opening inventory control accounts.
      evidence: Signed opening valuation and subledger-to-GL reconciliation.
      owner_role: Inventory Controller
      source_references: [DR-06, RISK-04]
